<!doctype html>

<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | MedVew</title>
    <!-- Bootstrap 5.3.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../assets/resources/styles/main.css" />
    <link rel="stylesheet" href="../../../assets/resources/styles/login.css" />
  </head>
  <body class="auth-page">
    <main class="auth-page-main">
      <div class="login-card shadow-lg">
        <div class="login-card-body">
          <div class="brand-header">
            <div class="brand-mark">
              <span class="material-symbols-outlined text-white" data-icon="medical_services"
                >medical_services</span
              >
            </div>
            <h1 class="brand-name">MedVew</h1>
          </div>
          <header class="login-header">
            <p class="text-muted fw-medium mb-0">
              Insira suas credenciais para acessar o portal médico.
            </p>
          </header>
          <form action="../meus_exames/meus_exames.html">
            <div class="mb-4">
              <label class="form-label" for="cpf">CPF</label>
              <input
                class="form-control"
                id="cpf"
                placeholder="000.000.000-00"
                required
                type="text"
              />
            </div>
            <div class="mb-4">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label mb-0" for="password">Senha</label>
              </div>
              <div class="position-relative">
                <input
                  class="form-control"
                  id="password"
                  placeholder="••••••••"
                  required
                  type="password"
                />
                <button
                  class="password-toggle"
                  type="button"
                  aria-label="Alternar visibilidade da senha"
                >
                  <span class="material-symbols-outlined" data-icon="visibility">visibility</span>
                </button>
              </div>
            </div>
            <div class="mb-4 form-remember">
              <div class="form-check">
                <input class="form-check-input" id="remember" type="checkbox" />
                <label class="form-check-label ms-1" for="remember"
                  >Manter conectado por 30 dias</label
                >
              </div>
            </div>
            <div class="actions-group">
              <button class="btn btn-primary btn-submit" type="submit">
                Entrar no Portal
                <span class="material-symbols-outlined" data-icon="arrow_forward"
                  >arrow_forward</span
                >
              </button>
              <div class="divider"><span class="divider-text">Novo profissional?</span></div>
              <a class="btn btn-outline-primary" href="../cadastro/cadastro.html"
                >Solicitar Nova Conta</a
              >
            </div>
          </form>
          <footer class="login-footer">
            <p class="footer-text">
              <span class="material-symbols-outlined text-success" data-icon="verified_user"
                >verified_user</span
              >
              Conexão Segura em conformidade com LGPD
            </p>
            <div class="footer-links">
              <a class="footer-link" href="#">Central de Ajuda</a>
              <a class="footer-link" href="#">Privacidade</a>
            </div>
          </footer>
        </div>
      </div>
    </main>
    <div class="version-badge">Sistema v2.4.0-Estável</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
